name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests -q

      - name: CLI smoke test
        run: python -m src.run_redteam --config evals/config.yaml

      - name: Generate demo benchmark artifacts
        run: python -m src.generate_demo_benchmark
