run:
  name: baseline_mock_redteam
  output_dir: reports
  prompt_files:
    - prompts/adversarial_prompts.yaml
  max_cases:

provider:
  type: mock
  model: mock-redteam-v1
  mock_profile: mixed
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  timeout_seconds: 60
  temperature: 0.0
  max_tokens: 700

scoring:
  rule_based: true
  llm_judge:
    enabled: false
    provider: openai_compatible
    model: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1

reporting:
  formats:
    - markdown
    - json
    - html
  include_passed_examples: false

optional_integrations:
  deepeval: false
  langsmith: false

